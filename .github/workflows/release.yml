name: Publish

on:
  push:
    tags: [ "*" ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      -   name: Checkout
          uses: actions/checkout@v4
          with:
            fetch-depth: 0
            filter: tree:0

      -   name: Setup .NET
          uses: actions/setup-dotnet@v5
          with:
            dotnet-version: "9.x"

      -   name: Restore
          run: |
            dotnet restore
            dotnet tool restore

      -   name: Publish to Thunderstore
          env:
            THUNDERSTORE_TOKEN: ${{ secrets.TCLI_AUTH_TOKEN }}
          run: dotnet pack -c Release -p:PublishTS=true