name: Publish

env:
  PROJECT_FILE: './Plugin/Silksong.BingoSync.csproj'

on:
  push:
    tags: [ "*" ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      -   name: Checkout
          uses: actions/checkout@v7
          with:
            fetch-depth: 0
            filter: tree:0

      -   name: Setup .NET
          uses: actions/setup-dotnet@v6
          with:
            dotnet-version: "9.x"

      -   name: Restore
          run: dotnet restore "$PROJECT_FILE"
          env:
            PROJECT_FILE: ${{ env.PROJECT_FILE }}

      -   name: Publish to Thunderstore
          run: dotnet pack "$PROJECT_FILE" -c Release -p:PublishTS=true --no-restore
          env:
            THUNDERSTORE_TOKEN: ${{ secrets.TCLI_AUTH_TOKEN }}
            PROJECT_FILE: ${{ env.PROJECT_FILE }}
